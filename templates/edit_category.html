{% include 'navbar.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowther | Edit Category</title>

  <link rel="icon" href="{% static 'logo.jpg' %}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Nunito:300,400,600,700|Poppins:300,400,500,600,700" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>

<main id="main" class="main">

  <h3 class="card-title mb-4">Edit Expense Category</h3>

  <div class="card p-4 shadow-sm">
    <form method="POST">
      {% csrf_token %}

      <div class="row">

        <!-- Category Name -->
        <div class="col-md-6 mb-3">
          <label>Category Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            value="{{ category.name }}"
            required
          >
        </div>

      </div>

      <!-- Buttons -->
      <div class=" mt-3">
        <button type="submit" class="btn btn-primary btn-sm">Update</button>
        <a href="{% url 'category_list' %}" class="btn btn-secondary btn-sm">Cancel</a>
      </div>

    </form>
  </div>

</main>

</body>
</html>
