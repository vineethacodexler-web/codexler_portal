{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Project Expenses</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }
    .main-container { display:flex; }
    .content { flex:1; padding:20px; }
    .card-box {
      background:#fff;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

{% include 'navbar.html' %}
<main id="main" class="main">

<div class="content">

<h4>Project Expenses</h4>

<div class="card-box">

<form method="POST">
{% csrf_token %}

<select name="project" class="form-control mb-2">
  {% for p in projects %}
  <option value="{{ p.id }}">{{ p.name }}</option>
  {% endfor %}
</select>

<input type="text" name="expense_name" class="form-control mb-2" placeholder="Expense Name">

<input type="number" name="amount" class="form-control mb-2" placeholder="Amount">

<input type="date" name="date" class="form-control mb-2">

<button class="btn btn-danger">Save</button>

</form>

</div>

<div class="card-box mt-3">

<table class="table">
<tr>
<th>Project</th>
<th>Expense</th>
<th>Amount</th>
<th>Date</th>
</tr>

{% for e in expenses %}
<tr>
<td>{{ e.project.name }}</td>
<td>{{ e.expense_name }}</td>
<td class="text-danger">₹{{ e.amount }}</td>
<td>{{ e.date }}</td>
</tr>
{% endfor %}

</table>

</div>

</div>
</main>

</body>
</html>
