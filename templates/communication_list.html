{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="container-fluid">

<div class="card">

<div class="card-header">
    <h4>Communication History</h4>
</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>
    <th>Client</th>
    <th>Type</th>
    <th>Subject</th>
    <th>Handled By</th>
    <th>Date</th>
</tr>

</thead>

<tbody>

{% for c in communications %}

<tr>

    <td>{{ c.client.name }}</td>

    <td>{{ c.communication_type }}</td>

    <td>{{ c.subject }}</td>

    <td>{{ c.handled_by }}</td>

    <td>{{ c.communication_date }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</main>
