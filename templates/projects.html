<!DOCTYPE html>
<html>
<head>
  <title>Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
{% include 'navbar.html' %}
<main id="main" class="main">
  <h4>Projects</h4>

  <!-- Add Project -->
  <form method="POST" class="card p-3">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-4">
        <input name="name" class="form-control" placeholder="Project Name">
      </div>

      <div class="col-md-4">
        <select name="client" class="form-control">
          {% for c in clients %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-4">
        <input name="amount" class="form-control" placeholder="Total Amount">
      </div>
    </div>
<div class="col-md-2">
    <button class="btn btn-success mt-3 btn-sm">Add Project</button>
</div>
  </form>

  <!-- List -->
  <table class="table mt-4">
    <tr>
      <th>Project</th>
      <th>Client</th>
      <th>Total Amount</th>
    </tr>

    {% for p in projects %}
    <tr>
      <td>{{ p.name }}</td>
      <td>{{ p.client.name }}</td>
      <td>₹{{ p.total_amount }}</td>
    </tr>
    {% endfor %}

  </table>

</main>
</body>
</html>
