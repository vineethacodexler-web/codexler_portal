{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="container-fluid mt-4">

    <div class="card">

        <div class="card-header">

            <h4>Add Follow Up</h4>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Lead</label>

                        <select name="lead"
                                class="form-select">

                            {% for lead in leads %}

                            <option value="{{ lead.id }}">

                                {{ lead.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Follow Up Date</label>

                        <input type="datetime-local"
                               name="followup_date"
                               class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Status</label>

                        <select name="status"
                                class="form-select">

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Completed">
                                Completed
                            </option>

                            <option value="Missed">
                                Missed
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Created By</label>

                        <select name="created_by"
                                class="form-select">

                            {% for employee in employees %}

                            <option value="{{ employee.id }}">

                                {{ employee.First_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label>Remarks</label>

                        <textarea name="remarks"
                                  class="form-control"></textarea>

                    </div>

                    <div class="col-md-12">

                        <button type="submit"
                                class="btn btn-primary">

                            Save Follow Up

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

</main>
