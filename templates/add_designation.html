{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="card">

<div class="card-header">
<h4>Add Designation</h4>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Department</label>

<select
name="department"
class="form-control"
required>

<option value="">
Select Department
</option>

{% for department in departments %}

<option value="{{ department.id }}">
{{ department.name }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Designation</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"></textarea>

</div>

<button
class="btn btn-primary">

Save Designation

</button>

</form>

</div>

</div>

</main>
