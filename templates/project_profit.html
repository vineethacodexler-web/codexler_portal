{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Project Profit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }
    .main-container { display:flex; }
    .content { flex:1; padding:20px; }
    .card-box {
      background:#fff;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

{% include 'navbar.html' %}
<main id="main" class="main">

<div class="content">

<h4>Project Profit Report</h4>

<div class="card-box">

<table class="table table-bordered">

<tr>
<th>Project</th>
<th>Total Income</th>
<th>Total Expense</th>
<th>Profit</th>
</tr>

{% for p in project_data %}
<tr>

<td>{{ p.project.name }}</td>

<td class="text-success">
₹{{ p.income }}
</td>

<td class="text-danger">
₹{{ p.expense }}
</td>

<td>
{% if p.profit > 0 %}
<span class="text-success">
₹{{ p.profit }}
</span>
{% else %}
<span class="text-danger">
₹{{ p.profit }}
</span>
{% endif %}
</td>

</tr>
{% endfor %}

</table>

</div>

</div>
</main>
</body>
</html>
