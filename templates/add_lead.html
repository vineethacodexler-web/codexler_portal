{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="container-fluid mt-4">

    <div class="card">

        <div class="card-header">

            <h4>Add Lead</h4>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Lead Name

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Company

                        </label>

                        <input
                            type="text"
                            name="company"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Lead Source

                        </label>

                        <select
                            name="source"
                            class="form-select">

                            <option value="Website">
                                Website
                            </option>

                            <option value="Referral">
                                Referral
                            </option>

                            <option value="Facebook">
                                Facebook
                            </option>

                            <option value="Instagram">
                                Instagram
                            </option>

                            <option value="Google Ads">
                                Google Ads
                            </option>

                            <option value="Manual">
                                Manual Entry
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Lead Status

                        </label>

                        <select
                            name="status"
                            class="form-select">

                            <option value="New">
                                New
                            </option>

                            <option value="Contacted">
                                Contacted
                            </option>

                            <option value="Qualified">
                                Qualified
                            </option>

                            <option value="Converted">
                                Converted
                            </option>

                            <option value="Lost">
                                Lost
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Assigned Employee

                        </label>

                        <select
                            name="assigned_to"
                            class="form-select">

                            <option value="">
                                Select Employee
                            </option>

                            {% for employee in employees %}

                            <option value="{{ employee.id }}">

                                {{ employee.First_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">

                            Notes

                        </label>

                        <textarea
                            name="notes"
                            rows="4"
                            class="form-control"></textarea>

                    </div>

                    <div class="col-md-12">

                        <button
                            type="submit"
                            class="btn btn-primary">

                            <i class="bi bi-save"></i>

                            Save Lead

                        </button>

                        <a href="{% url 'lead_list' %}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

</main>
