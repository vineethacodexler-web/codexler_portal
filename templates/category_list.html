{% include 'navbar.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Expense Categories</title>

  <link rel="icon" href="{% static 'logo.jpg' %}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Nunito:300,400,600,700|Poppins:300,400,500,600,700" rel="stylesheet">

  <!-- Icons & CSS -->
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
  <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  .btn {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
}
.table th {
  font-size: 12px;
  padding: 6px;
}

.table td {
  font-size: 12px;
  padding: 6px;
}
</style>
</head>

<body>
<main id="main" class="main">

  <h3 class="card-title mb-2">Expense Categories</h3>

  <!-- Add Button -->
  <a href="{% url 'add_category' %}" class="btn btn-primary">Add Category</a>

  <!-- Table -->
  <div class="table-responsive mt-3">
    <table id="categoryTable" class="table table-striped table-bordered align-middle">

      <thead class="table-light" >
        <tr>
          <th>Category Name</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody >
        {% for c in categories %}
        <tr>
          <td>{{ c.name }}</td>
          <td>
            <a class=" btn-sm" href="{% url 'edit_category' c.id %}">
              <i class="bi bi-pencil-square"></i>
            </a>

            <a class="btn-sm delete-btn" href="{% url 'delete_category' c.id %}">
              <i class="bi bi-trash text-danger"></i>
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>

    </table>
  </div>

</main>

<script>
  // DataTable
  $(document).ready(function() {
    $('#categoryTable').DataTable({
      "paging": true,
      "searching": true,
      "info": true,
      "ordering": true,
      "pageLength": 10,
      "lengthChange": true,
      "columnDefs": [
        { "orderable": false, "targets": [1] }
      ]
    });
  });

  // SweetAlert Delete Confirm
  $('.delete-btn').on('click', function(e) {
    e.preventDefault();
    let link = $(this).attr('href');

    Swal.fire({
      title: 'Are you sure?',
      text: "This category will be deleted!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
      if (result.isConfirmed) {
        window.location.href = link;
      }
    });
  });
</script>

</body>
</html>
