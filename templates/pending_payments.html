{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Pending Payments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }

    .main-container {
      display:flex;
    }

    .content {
      flex:1;
      padding:20px;
    }

    .card-box {
      background:#fff;
      border-radius:10px;
      padding:20px;
    }
  </style>
</head>

<body>

{% include 'navbar.html' %}
<main id="main" class="main">

<div class="content">

<h4>Pending Payments</h4>

<div class="card-box mt-3">

<table class="table table-bordered">

<thead>
<tr>
<th>Client</th>
<th>Project</th>
<th>Total Amount</th>
<th>Paid</th>
<th>Pending</th>
</tr>
</thead>

<tbody>

{% for p in pending_data %}

<tr>

<td>{{ p.client.name }}</td>

<td>{{ p.project.name }}</td>

<td>
₹{{ p.total_amount }}
</td>

<td class="text-success">
₹{{ p.paid }}
</td>

<td class="text-danger">
₹{{ p.pending }}
</td>

</tr>

{% empty %}

<tr>
<td colspan="5" class="text-center">
No pending payments
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</main>
</body>
</html>
