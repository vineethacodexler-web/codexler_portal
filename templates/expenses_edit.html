{% include 'navbar.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowther | Edit Expense</title>

  <link rel="icon" href="{% static 'logo.jpg' %}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Nunito:300,400,600,700|Poppins:300,400,500,600,700" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>

<main id="main" class="main">

  <h3 class="card-title mb-4">Edit Expense</h3>

  <div class="card p-4 shadow-sm">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row">

        <!-- Category -->
        <div class="col-md-6 mb-3">
          <label>Category</label>
          <select name="category" class="form-control">
            {% for c in categories %}
              <option value="{{ c.id }}" {% if c.id == expense.category.id %}selected{% endif %}>
                {{ c.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Amount -->
        <div class="col-md-6 mb-3">
          <label>Amount</label>
          <input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}">
        </div>

        <!-- Date -->
        <div class="col-md-6 mb-3">
          <label>Date</label>
          <input type="date" name="date" class="form-control" value="{{ expense.date|date:'Y-m-d' }}">
        </div>

        <!-- Receipt -->
        <div class="col-md-6 mb-3">
          <label>Receipt</label>
          <input type="file" name="receipt" class="form-control">

          {% if expense.receipt %}
            <small>
              Current: <a href="{{ expense.receipt.url }}" target="_blank">View File</a>
            </small>
          {% endif %}
        </div>

        <!-- Description -->
        <div class="col-md-12 mb-3">
          <label>Description</label>
          <textarea name="description" class="form-control" rows="3">{{ expense.description }}</textarea>
        </div>

      </div>

      <!-- Buttons -->
      <div class="text-center mt-3">
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>

</main>

</body>
</html>
