{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Other Income</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .main-container {
      display: flex;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      height: 60px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .card-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
    }
  </style>
</head>

<body>

{% include 'navbar.html' %}
<main id="main" class="main">

  <div class="content">

    <div class="topbar">
      <h5>Other Income</h5>
    </div>

    <!-- Form -->
    <div class="card-box">
      <h6>Add Other Income</h6>

      <form method="POST">
        {% csrf_token %}

        <div class="row">

          <div class="col-md-4">
            <label>Source</label>
            <input type="text" name="source" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label>Amount</label>
            <input type="number" name="amount" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label>Date</label>
            <input type="date" name="date" class="form-control" required>
          </div>

        </div>

        <button type="submit" class="btn btn-primary mt-3">
          Save Income
        </button>

      </form>
    </div>

    <!-- Table -->
    <div class="card-box mt-4">

      <h6>Income History</h6>

      <table class="table table-bordered">

        <thead>
          <tr>
            <th>Source</th>
            <th>Amount</th>
            <th>Date</th>
          </tr>
        </thead>

        <tbody>

          {% for i in incomes %}
          <tr>
            <td>{{ i.source }}</td>
            <td class="text-success">₹{{ i.amount }}</td>
            <td>{{ i.date }}</td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="text-center">
              No income records found
            </td>
          </tr>
          {% endfor %}

        </tbody>

      </table>

    </div>

  </div>
</main>
</body>
</html>
