{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Payment History</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }

    .main-container {
      display:flex;
    }

    .content {
      flex:1;
      padding:20px;
    }

    .card-box {
      background:#fff;
      border-radius:10px;
      padding:20px;
    }
  </style>
</head>

<body>

{% include 'navbar.html' %}
<main id="main" class="main">

<div class="content">

<h4>Payment History</h4>

<div class="card-box mt-3">

<table class="table table-bordered">

<thead>
<tr>
<th>Client</th>
<th>Project</th>
<th>Amount</th>
<th>Date</th>
<th>Payment Mode</th>
</tr>
</thead>

<tbody>

{% for i in incomes %}

<tr>

<td>{{ i.client.name }}</td>

<td>{{ i.project.name }}</td>

<td class="text-success">
₹{{ i.amount }}
</td>

<td>{{ i.date }}</td>

<td>{{ i.payment_mode }}</td>

</tr>

{% empty %}

<tr>
<td colspan="5" class="text-center">
No payment records found
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>
</main>

</body>
</html>
