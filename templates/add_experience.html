{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="card">

<div class="card-header">
<h4>Add Employee Experience</h4>
</div>

<div class="card-body">

<form method="POST"
      enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label>Employee</label>

<select
name="employee"
class="form-control"
required>

<option value="">
Select Employee
</option>

{% for employee in employees %}

<option value="{{ employee.id }}">
{{ employee.First_name }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">
<label>Company Name</label>
<input type="text"
       name="company_name"
       class="form-control"
       required>
</div>

<div class="mb-3">
<label>Designation</label>
<input type="text"
       name="designation"
       class="form-control"
       required>
</div>

<div class="mb-3">
<label>Start Date</label>
<input type="date"
       name="start_date"
       class="form-control">
</div>

<div class="mb-3">
<label>End Date</label>
<input type="date"
       name="end_date"
       class="form-control">
</div>

<div class="mb-3">
<label>Salary</label>
<input type="number"
       name="salary"
       class="form-control">
</div>

<div class="mb-3">
<label>Responsibilities</label>
<textarea
name="responsibilities"
class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Experience Certificate</label>
<input
type="file"
name="experience_certificate"
class="form-control">
</div>

<button
class="btn btn-primary">
Save Experience
</button>

</form>

</div>

</div>

</main>
