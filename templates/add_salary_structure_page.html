<!-- templates/add_salary_structure_page.html -->

{% include 'admin_navbar.html' %}

<main id="main" class="main">
<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            <h4>Add Salary Structure</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Employee</label>

                        <select name="employee"
                                class="form-control"
                                required>

                            <option value="">
                                Select Employee
                            </option>

                            {% for emp in employees %}

                            <option value="{{ emp.id }}">

                                {{ emp.First_name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Basic Salary</label>

                        <input type="number"
                               step="0.01"
                               name="basic_salary"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>HRA</label>

                        <input type="number"
                               step="0.01"
                               name="hra"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>DA</label>

                        <input type="number"
                               step="0.01"
                               name="da"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Travel Allowance</label>

                        <input type="number"
                               step="0.01"
                               name="travel_allowance"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Medical Allowance</label>

                        <input type="number"
                               step="0.01"
                               name="medical_allowance"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>PF Percentage</label>

                        <input type="number"
                               step="0.01"
                               name="pf_percentage"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>ESI Percentage</label>

                        <input type="number"
                               step="0.01"
                               name="esi_percentage"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Overtime Rate Per Hour</label>

                        <input type="number"
                               step="0.01"
                               name="overtime_rate_per_hour"
                               class="form-control">
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Save Salary Structure

                </button>

            </form>

        </div>

    </div>

</div>
</main>
