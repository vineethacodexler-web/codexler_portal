{% include 'admin_navbar.html' %}

<main id="main" class="main">

<div class="card">

    <div class="card-header">
        <h4>Edit Department</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Department Name</label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ department.name }}"
                    required>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4">{{ department.description }}</textarea>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Update Department

            </button>

        </form>

    </div>

</div>

</main>
