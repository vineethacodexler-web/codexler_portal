{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Clients</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
{% include 'navbar.html' %}
<main id="main" class="main">

  <h4>Clients</h4>

  <!-- Add Client -->
  <form method="POST" class="card p-3">
    {% csrf_token %}
    <div class="row">
      <div class="col-md-3"><input name="name" class="form-control" placeholder="Name"></div>
      <div class="col-md-3"><input name="email" class="form-control" placeholder="Email"></div>
      <div class="col-md-3"><input name="phone" class="form-control" placeholder="Phone"></div>
      <div class="col-md-3"><input name="company" class="form-control" placeholder="Company"></div>
    </div>
    <button class="btn btn-primary mt-2" style="width:10%;">Add Client</button>
  </form>

  <!-- List -->
  <table class="table mt-4">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Action</th>
    </tr>

    {% for c in clients %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.email }}</td>
      <td>{{ c.phone }}</td>
      <td>
        <a href="/delete_client/{{ c.id }}/" class="btn btn-danger btn-sm">Delete</a>
      </td>
    </tr>
    {% endfor %}

  </table>

</main>
</body>
</html>
