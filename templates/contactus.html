{% load static %}
{% include 'header.html' %}
<link rel="stylesheet" href="{% static 'css/contactus.css' %}">
<script src="{% static 'js/contactus.js' %}"></script>

<section class="bg-slate-950 text-white overflow-hidden">

  <!-- ================= HEADING ================= -->
  <div class="contact-heading">
    <h2>Contact Us</h2>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>

  <!-- ================= CONTACT SECTION ================= -->
  <section class="relative py-24 px-6 md:px-16">

    <!-- Background Glow -->
    <div class="absolute inset-0 bg-gradient-to-r from-purple-600 via-pink-500 to-indigo-500 opacity-10 blur-3xl"></div>

    <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 relative z-10">

      <!-- LEFT SIDE (INFO + MAP) -->
      <div class="fade-up space-y-6">

        <div>
          <h3 class="text-3xl font-bold mb-4">Let's Talk</h3>
          <p class="text-gray-400 mb-6">
            Have a project or idea? Send us a message and we’ll get back to you.
          </p>

          <div class="space-y-3 text-gray-300">
            <p>📧 info@codexlertechnologies.com</p>
            <p>📞 +91 9446144277</p>
            <p>📍 Kerala, India</p>
          </div>
        </div>

        <!-- GOOGLE MAP -->
        <div class="rounded-xl overflow-hidden border border-gray-700">

        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3929.1935706152212!2d76.3353398!3d10.0008637!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b080d56caa72679%3A0x108946c50a8d92bd!2sCodexler%20Technologies%20Pvt%20Ltd!5e0!3m2!1sen!2sin!4v1775325016886!5m2!1sen!2sin"
            width="100%" 
            height="220" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
          </iframe>
        </div>

      </div>

  <form method="POST" class="contact-form fade-up">
    {% csrf_token %}

    <!-- Honeypot -->
    <input type="text"
           name="website"
           style="display:none">

    <input type="text"
           name="name"
           placeholder="Your Name"
           required>

    <input type="email"
           name="email"
           placeholder="Your Email"
           required>

    <input type="text"
           name="subject"
           placeholder="Subject"
           required>

    <textarea name="message"
              rows="5"
              placeholder="Message"
              required></textarea>

    <!-- Cloudflare Turnstile -->
    <div class="cf-turnstile mt-3"
         data-sitekey="0x4AAAAAADTmhkZLIMKF3-zF"></div>

    <button type="submit">
        Send Message →
    </button>
</form>

<!-- Turnstile Script -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js"
        async
        defer></script>

    </div>

  </section>

</section>


<!-- ================= JS ================= -->
<script>

// Scroll Animation
document.addEventListener("DOMContentLoaded", function () {
  const elements = document.querySelectorAll('.fade-up');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  elements.forEach(el => observer.observe(el));
});

// Toast Function
function showToast(message, isError=false) {
  const toast = document.getElementById("toast");
  const msg = document.getElementById("toast-message");

  msg.innerText = message;

  toast.classList.remove("hidden");
  toast.classList.add("show");

  if(isError){
    toast.classList.add("error");
  } else {
    toast.classList.remove("error");
  }

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.classList.add("hidden"), 300);
  }, 3000);
}

// Django Messages Trigger
{% if success %}
  showToast("{{ success }}");
{% endif %}

{% if error %}
  showToast("{{ error }}", true);
{% endif %}

</script>

{% include 'footer.html' %}
