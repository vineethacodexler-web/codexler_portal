<!-- templates/delete_extra_working_day.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Delete Entry</title>
</head>
<body>
    <h2>Are you sure you want to delete this entry?</h2>
    <p>Date: {{ entry.date }} | Hours: {{ entry.hours }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'list_extra_working_days' %}">Cancel</a>
    </form>
</body>
</html>
